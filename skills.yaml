      AWS — cloud services. GitHub Actions — CI/CD, automated workflows.
      Docker — containerization.

  - id: testing
    category: Testing and Automation
    text: >
      Selenium, Appium — web and mobile automation.
      Playwright — modern browser automation.
      Slash Framework — Python test automation.
      TestRail — test management, API integration.
      Data-Driven Testing with YAML.

  - id: frontend
    category: Frontend
    text: >
      Vanilla JavaScript — ES modules, Canvas API, DOM manipulation.
      HTML5/CSS3 — responsive design, CSS variables, animations.
      No-framework approach — lightweight, performant UIs.

