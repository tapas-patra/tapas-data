entries:
  - id: languages
    category: Languages
    text: >
      Python (Advanced) — my primary language for backend, automation, and AI.
      JavaScript/TypeScript — frontend, Node.js, Cloudflare Workers.
      Java — enterprise development.
      SQL — PostgreSQL, complex queries, database design.

  - id: backend
    category: Backend and APIs
    text: >
      FastAPI — async Python APIs, SSE streaming, middleware.
      Node.js — server-side JavaScript.
      REST API design and implementation.
      GraphQL. WebSockets for real-time communication.

  - id: ai-ml
    category: AI and Machine Learning
    text: >
      LLM Integration — Claude API, OpenAI, Gemini, Mistral, Ollama.
      RAG (Retrieval-Augmented Generation) — pgvector, embedding pipelines, hybrid search.
      Prompt Engineering — system prompts, context injection, persona design.
      AI Provider Abstraction — pluggable multi-provider architecture.

  - id: databases
    category: Databases
    text: >
      PostgreSQL — Neon serverless, Supabase.
      pgvector — vector similarity search, HNSW indexing.
      MongoDB. Redis — caching.

