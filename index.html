<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapasData — RAG Control Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg-deep: #0a0a12;
  --bg-surface: #111120;
  --bg-card: #161628;
  --bg-card-hover: #1c1c38;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
  --glass-hover: rgba(255,255,255,0.08);
  --cyan: #00e5ff;
  --cyan-dim: rgba(0,229,255,0.15);
  --cyan-glow: rgba(0,229,255,0.3);
  --violet: #7c3aed;
  --violet-light: #a78bfa;
  --violet-dim: rgba(124,58,237,0.15);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.15);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.15);
  --text-primary: #e8e8f0;
  --text-secondary: #a0a0b8;
  --text-dim: #606078;
  --font-display: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 12px;
  --radius-sm: 8px;
}

html { font-size: 15px; }

body {
  font-family: var(--font-display);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  top: -40%; left: -20%;
  width: 80vw; height: 80vw;
  background: radial-gradient(circle, rgba(124,58,237,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -30%; right: -10%;
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(0,229,255,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Auth Screen ── */
.auth-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

.auth-card {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 48px 40px;
  width: 420px;
  max-width: 90vw;
  text-align: center;
  animation: fadeUp 0.5s ease;
}

.auth-logo {
  font-family: var(--font-mono);
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.auth-logo .accent { color: var(--cyan); }

.auth-sub {
  color: var(--text-dim);
  font-size: 0.8rem;
  margin-bottom: 32px;
  font-family: var(--font-mono);
}

.auth-input {
  width: 100%;
  background: var(--bg-deep);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.auth-input:focus { border-color: var(--cyan); }
.auth-input::placeholder { color: var(--text-dim); }

.auth-btn {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--violet), var(--cyan));
  color: #fff;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
}
.auth-btn:hover { opacity: 0.9; }
.auth-btn:active { transform: scale(0.98); }

.auth-hint {
  margin-top: 20px;
  font-size: 0.72rem;
  color: var(--text-dim);
  line-height: 1.6;
}
.auth-hint a { color: var(--violet-light); text-decoration: none; }

.auth-error {
  margin-top: 12px;
  color: var(--red);
  font-size: 0.8rem;
  font-family: var(--font-mono);
  display: none;
}

/* ── Main App ── */
.app { display: none; position: relative; z-index: 1; }
.app.active { display: block; }

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 32px;
  border-bottom: 1px solid var(--glass-border);
  background: rgba(10,10,18,0.8);
  backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left { display: flex; align-items: center; gap: 16px; }

.logo {
  font-family: var(--font-mono);
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.logo .accent { color: var(--cyan); }

.header-stats {
  display: flex;
  gap: 16px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-dim);
}
.stat-val { color: var(--cyan); font-weight: 600; }

.header-right { display: flex; align-items: center; gap: 10px; }

.btn {
  padding: 8px 18px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  background: var(--glass);
  color: var(--text-primary);
  font-family: var(--font-display);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.btn:hover { background: var(--glass-hover); border-color: var(--text-dim); }

.btn-cyan { border-color: var(--cyan); color: var(--cyan); }
.btn-cyan:hover { background: var(--cyan-dim); }

.btn-violet { border-color: var(--violet); color: var(--violet-light); }
.btn-violet:hover { background: var(--violet-dim); }

.btn-red { border-color: var(--red); color: var(--red); }
.btn-red:hover { background: var(--red-dim); }

.btn-green { border-color: var(--green); color: var(--green); }
.btn-green:hover { background: var(--green-dim); }

.btn-sm { padding: 5px 12px; font-size: 0.72rem; }

.btn-icon {
  width: 34px; height: 34px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
}

/* ── Status Bar ── */
.status-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 10px 32px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--glass-border);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  animation: fadeDown 0.3s ease;
}
.status-bar.active { display: flex; }

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--amber);
  animation: pulse 1.5s ease infinite;
}
.status-dot.success { background: var(--green); animation: none; }
.status-dot.error { background: var(--red); animation: none; }

.status-text { color: var(--text-secondary); flex: 1; }
.status-close {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 1.1rem; padding: 2px 6px;
}

/* ── Main Content ── */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 32px 60px;
}

/* Source Cards */
.source-grid {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.source-card {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.source-card:nth-child(2) { animation-delay: 0.05s; }
.source-card:nth-child(3) { animation-delay: 0.1s; }
.source-card:nth-child(4) { animation-delay: 0.15s; }
.source-card:nth-child(5) { animation-delay: 0.2s; }
.source-card:nth-child(6) { animation-delay: 0.25s; }

.source-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--glass-border);
  cursor: pointer;
  transition: background 0.2s;
}
.source-header:hover { background: var(--glass); }

.source-title-wrap { display: flex; align-items: center; gap: 12px; }

.source-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  background: var(--violet-dim);
  border: 1px solid rgba(124,58,237,0.2);
}

.source-title {
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: -0.3px;
}

.source-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.75rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
}

.source-count {
  background: var(--cyan-dim);
  color: var(--cyan);
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
  font-size: 0.7rem;
}

.source-chevron {
  color: var(--text-dim);
  transition: transform 0.3s;
  font-size: 0.9rem;
}
.source-card.open .source-chevron { transform: rotate(180deg); }

.source-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.source-card.open .source-body { max-height: 5000px; }

.source-actions {
  display: flex;
  gap: 8px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--glass-border);
  background: rgba(0,0,0,0.15);
}

/* Entry cards */
.entry-list { padding: 12px 20px 20px; display: flex; flex-direction: column; gap: 10px; }

.entry-card {
  background: var(--bg-deep);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  transition: border-color 0.2s;
}
.entry-card:hover { border-color: rgba(255,255,255,0.12); }

.entry-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
}

.entry-id {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--cyan);
  background: var(--cyan-dim);
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
}

.entry-actions { display: flex; gap: 6px; }

.entry-fields { display: flex; flex-direction: column; gap: 6px; }

.entry-field {
  display: flex;
  gap: 8px;
  font-size: 0.82rem;
  line-height: 1.5;
}

.entry-field-key {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--violet-light);
  min-width: 80px;
  padding-top: 2px;
  flex-shrink: 0;
}

.entry-field-val {
  color: var(--text-secondary);
  word-break: break-word;
}

/* ── Modal / Editor ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.active { display: flex; }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  width: 640px;
  max-width: 92vw;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.3s ease;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--glass-border);
}

.modal-title {
  font-weight: 700;
  font-size: 1.05rem;
}

.modal-close {
  background: none; border: none;
  color: var(--text-dim); cursor: pointer;
  font-size: 1.3rem; padding: 4px 8px;
  transition: color 0.2s;
}
.modal-close:hover { color: var(--text-primary); }

.modal-body {
  padding: 20px 24px;
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.form-group { display: flex; flex-direction: column; gap: 6px; }

.form-label {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input, .form-textarea {
  background: var(--bg-deep);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  padding: 10px 12px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-textarea:focus { border-color: var(--cyan); }

.form-textarea {
  min-height: 100px;
  resize: vertical;
  line-height: 1.6;
}

.form-hint {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-style: italic;
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 16px 24px;
  border-top: 1px solid var(--glass-border);
}

/* ── Toast ── */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 12px 18px;
  font-size: 0.82rem;
  color: var(--text-primary);
  font-family: var(--font-mono);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: slideIn 0.3s ease;
  min-width: 260px;
}
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
.toast.info { border-color: var(--cyan); }

/* ── Loading ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  gap: 12px;
}

.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--glass-border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
  font-size: 0.85rem;
}

/* ── Confirm dialog ── */
.confirm-text {
  color: var(--text-secondary);
  font-size: 0.9rem;
  line-height: 1.6;
  padding: 8px 0;
}
.confirm-text strong { color: var(--red); }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
  .header-stats { display: none; }
  .main { padding: 16px; }
  .source-header { padding: 12px 14px; }
  .entry-list { padding: 10px 14px 14px; }
  .modal { max-width: 96vw; }
  .header-right { gap: 6px; }
  .btn { padding: 7px 12px; font-size: 0.75rem; }
}
</style>
</head>
<body>

<!-- Auth Screen -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">tapas<span class="accent">.data</span></div>
    <div class="auth-sub">RAG Control Center</div>
    <input class="auth-input" id="auth-token" type="password" placeholder="GitHub Personal Access Token" autocomplete="off">
    <button class="auth-btn" id="auth-btn">Connect</button>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-hint">
      Needs <strong>repo</strong> + <strong>workflow</strong> scopes<br>
      <a href="https://github.com/settings/tokens/new?scopes=repo,workflow" target="_blank">Generate token</a>
    </div>
  </div>
</div>

<!-- Main App -->
<div class="app" id="app">
  <header class="header">
    <div class="header-left">
      <div class="logo">tapas<span class="accent">.data</span></div>
      <div class="header-stats">
        <span><span class="stat-val" id="stat-sources">0</span> sources</span>
        <span><span class="stat-val" id="stat-entries">0</span> entries</span>
      </div>
    </div>
    <div class="header-right">
      <button class="btn btn-cyan" id="btn-sync" title="Incremental sync">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
        Sync
      </button>
      <button class="btn btn-violet" id="btn-full-reindex" title="Wipe and re-embed everything">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        Full Reindex
      </button>
      <button class="btn btn-icon" id="btn-logout" title="Disconnect">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </header>

  <div class="status-bar" id="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Syncing...</span>
    <button class="status-close" id="status-close">&times;</button>
  </div>

  <main class="main">
    <div id="content">
      <div class="loading"><div class="spinner"></div> Loading data...</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Edit Entry</div>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toast-container"></div>

<script>
const REPO = 'tapas-patra/tapas-data';
const BRANCH = 'main';
const API = 'https://api.github.com';
const WORKFLOW_FILE = 'sync-to-rag.yml';

const SOURCE_ICONS = {
  profile: '👤', skills: '⚡', experience: '💼',
  projects: '🚀', education: '🎓', achievements: '🏆',
};

let token = '';
let filesCache = {}; // filename → {sha, data, raw}

// ── Auth ──
function initAuth() {
  const saved = localStorage.getItem('tapasdata-token');
  if (saved) {
    token = saved;
    showApp();
    return;
  }
  document.getElementById('auth-screen').style.display = 'flex';
}

document.getElementById('auth-btn').addEventListener('click', async () => {
  const input = document.getElementById('auth-token');
  const err = document.getElementById('auth-error');
  const val = input.value.trim();
  if (!val) { err.textContent = 'Token required'; err.style.display = 'block'; return; }

  try {
    const resp = await ghFetch('/user', val);
    if (!resp.ok) throw new Error('Invalid token');
    token = val;
    localStorage.setItem('tapasdata-token', val);
    showApp();
  } catch (e) {
    err.textContent = 'Authentication failed — check token and scopes';
    err.style.display = 'block';
  }
});

document.getElementById('auth-token').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('auth-btn').click();
});

document.getElementById('btn-logout').addEventListener('click', () => {
  localStorage.removeItem('tapasdata-token');
  token = '';
  document.getElementById('app').classList.remove('active');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('auth-token').value = '';
  document.getElementById('auth-error').style.display = 'none';
});

async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  await loadAllFiles();
  resumeActiveRunOnLoad();
}

// ── GitHub API ──
async function ghFetch(path, tkn) {
  return fetch(`${API}${path}`, {
    headers: {
      Authorization: `Bearer ${tkn || token}`,
      Accept: 'application/vnd.github.v3+json',
    },
  });
}

async function ghPut(path, body) {
  return fetch(`${API}${path}`, {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body),
  });
}

async function ghPost(path, body) {
  return fetch(`${API}${path}`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(body),
  });
}

// ── Load Data ──
async function loadAllFiles() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div> Loading data...</div>';
  filesCache = {};

  try {
    const resp = await ghFetch(`/repos/${REPO}/contents?ref=${BRANCH}`);
    if (!resp.ok) throw new Error('Failed to load repo');
    const contents = await resp.json();
    const yamlFiles = contents.filter(f => f.name.endsWith('.yaml'));

    const loaded = await Promise.all(yamlFiles.map(async (f) => {
      const r = await ghFetch(`/repos/${REPO}/contents/${f.name}?ref=${BRANCH}`);
      if (!r.ok) return null;
      const fileData = await r.json();
      const raw = atob(fileData.content.replace(/\n/g, ''));
      const decoded = new TextDecoder().decode(Uint8Array.from(raw, c => c.charCodeAt(0)));
      const data = jsyaml.load(decoded);
      if (!data || !data.source || !data.entries) return null;
      filesCache[f.name] = { sha: fileData.sha, data, raw: decoded, filename: f.name };
      return filesCache[f.name];
    }));

    renderDashboard(loaded.filter(Boolean));
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty-state">Failed to load: ${esc(e.message)}</div>`;
    toast('Failed to load data', 'error');
  }
}

// ── Render ──
function renderDashboard(files) {
  const totalEntries = files.reduce((sum, f) => sum + f.data.entries.length, 0);
  document.getElementById('stat-sources').textContent = files.length;
  document.getElementById('stat-entries').textContent = totalEntries;

  const grid = document.createElement('div');
  grid.className = 'source-grid';

  files.forEach(file => {
    const card = document.createElement('div');
    card.className = 'source-card';
    const icon = SOURCE_ICONS[file.data.source] || '📄';

    card.innerHTML = `
      <div class="source-header">
        <div class="source-title-wrap">
          <div class="source-icon">${icon}</div>
          <div>
            <div class="source-title">${esc(file.data.label || file.data.source)}</div>
            <div class="source-meta">
              <span>${esc(file.filename)}</span>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="source-count">${file.data.entries.length} entries</span>
          <span class="source-chevron">▾</span>
        </div>
      </div>
      <div class="source-body">
        <div class="source-actions">
          <button class="btn btn-sm btn-green btn-add" data-file="${esc(file.filename)}">+ Add Entry</button>
        </div>
        <div class="entry-list">
          ${file.data.entries.map((entry, i) => renderEntry(entry, file.filename, i)).join('')}
        </div>
      </div>
    `;

    card.querySelector('.source-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });

    card.querySelector('.btn-add').addEventListener('click', (e) => {
      e.stopPropagation();
      openAddModal(file.filename);
    });

    card.querySelectorAll('.btn-edit').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.index);
        openEditModal(file.filename, idx);
      });
    });

    card.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.index);
        openDeleteConfirm(file.filename, idx);
      });
    });

    grid.appendChild(card);
  });

  const content = document.getElementById('content');
  content.innerHTML = '';
  content.appendChild(grid);
}

function renderEntry(entry, filename, index) {
  const fields = Object.entries(entry)
    .filter(([k]) => k !== 'id')
    .map(([k, v]) => {
      let display = v;
      if (Array.isArray(v) && v.length > 0 && typeof v[0] === 'object') {
        // Array of objects (e.g., skills) — show as compact summary
        display = v.map(item => item.name || item.id || JSON.stringify(item)).join(', ');
      } else if (Array.isArray(v)) {
        display = v.join(', ');
      } else if (typeof v === 'object' && v !== null) {
        display = JSON.stringify(v);
      } else if (typeof v === 'string') {
        display = v.length > 200 ? v.slice(0, 200) + '...' : v;
      }
      return `<div class="entry-field">
        <span class="entry-field-key">${esc(k)}</span>
        <span class="entry-field-val">${esc(String(display).trim())}</span>
      </div>`;
    }).join('');

  return `<div class="entry-card">
    <div class="entry-header">
      <span class="entry-id">${esc(entry.id || '??')}</span>
      <div class="entry-actions">
        <button class="btn btn-sm btn-cyan btn-edit" data-file="${esc(filename)}" data-index="${index}">Edit</button>
        <button class="btn btn-sm btn-red btn-delete" data-file="${esc(filename)}" data-index="${index}">Delete</button>
      </div>
    </div>
    <div class="entry-fields">${fields}</div>
  </div>`;
}

// ── Edit Modal ──
function openEditModal(filename, index) {
  const file = filesCache[filename];
  const entry = file.data.entries[index];

  document.getElementById('modal-title').textContent = `Edit — ${entry.id}`;
  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  const fields = Object.entries(entry);
  fields.forEach(([key, val]) => {
    const group = document.createElement('div');
    group.className = 'form-group';

    let inputHtml;
    if (key === 'id') {
      inputHtml = `<input class="form-input" data-key="${esc(key)}" value="${esc(String(val))}" readonly style="opacity:0.5;cursor:not-allowed">`;
    } else if (typeof val === 'string' && val.length > 60) {
      inputHtml = `<textarea class="form-textarea" data-key="${esc(key)}" rows="4">${esc(String(val).trim())}</textarea>`;
    } else if (Array.isArray(val) && val.length > 0 && typeof val[0] === 'object') {
      // Array of objects — edit as JSON
      inputHtml = `<textarea class="form-textarea form-json" data-key="${esc(key)}" data-type="json-array" rows="6">${esc(JSON.stringify(val, null, 2))}</textarea>
        <span class="form-hint">JSON array of objects</span>`;
    } else if (Array.isArray(val)) {
      inputHtml = `<input class="form-input" data-key="${esc(key)}" data-type="array" value="${esc(val.join(', '))}">
        <span class="form-hint">Comma-separated values</span>`;
    } else if (typeof val === 'boolean') {
      inputHtml = `<input class="form-input" data-key="${esc(key)}" data-type="boolean" value="${val}">
        <span class="form-hint">true or false</span>`;
    } else {
      inputHtml = `<input class="form-input" data-key="${esc(key)}" value="${esc(String(val))}">`;
    }

    group.innerHTML = `<label class="form-label">${esc(key)}</label>${inputHtml}`;
    body.appendChild(group);
  });

  const footer = document.getElementById('modal-footer');
  footer.innerHTML = `
    <button class="btn" id="modal-cancel">Cancel</button>
    <button class="btn btn-cyan" id="modal-save">Save & Commit</button>
  `;

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-save').addEventListener('click', () => saveEntry(filename, index));

  openModal();
}

function openAddModal(filename) {
  const file = filesCache[filename];
  const template = file.data.entries[0] || {};

  document.getElementById('modal-title').textContent = `New Entry — ${file.data.source}`;
  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  const fields = Object.keys(template);
  fields.forEach(key => {
    const group = document.createElement('div');
    group.className = 'form-group';
    const val = template[key];

    let inputHtml;
    if (typeof val === 'string' && val.length > 60) {
      inputHtml = `<textarea class="form-textarea" data-key="${esc(key)}" rows="3" placeholder="Enter ${key}..."></textarea>`;
    } else if (Array.isArray(val)) {
      inputHtml = `<input class="form-input" data-key="${esc(key)}" data-type="array" placeholder="Comma-separated values">
        <span class="form-hint">Comma-separated values</span>`;
    } else {
      inputHtml = `<input class="form-input" data-key="${esc(key)}" placeholder="Enter ${key}...">`;
    }

    group.innerHTML = `<label class="form-label">${esc(key)}</label>${inputHtml}`;
    body.appendChild(group);
  });

  const footer = document.getElementById('modal-footer');
  footer.innerHTML = `
    <button class="btn" id="modal-cancel">Cancel</button>
    <button class="btn btn-green" id="modal-save">Add & Commit</button>
  `;

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-save').addEventListener('click', () => addEntry(filename));

  openModal();
}

function openDeleteConfirm(filename, index) {
  const file = filesCache[filename];
  const entry = file.data.entries[index];

  document.getElementById('modal-title').textContent = 'Confirm Delete';
  const body = document.getElementById('modal-body');
  body.innerHTML = `<div class="confirm-text">Delete entry <strong>${esc(entry.id)}</strong> from ${esc(file.data.source)}?<br>This will commit the change immediately.</div>`;

  const footer = document.getElementById('modal-footer');
  footer.innerHTML = `
    <button class="btn" id="modal-cancel">Cancel</button>
    <button class="btn btn-red" id="modal-save">Delete & Commit</button>
  `;

  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-save').addEventListener('click', () => deleteEntry(filename, index));

  openModal();
}

function openModal() {
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ── CRUD Operations ──
async function saveEntry(filename, index) {
  const file = filesCache[filename];
  const inputs = document.querySelectorAll('#modal-body [data-key]');
  const updated = { ...file.data.entries[index] };

  inputs.forEach(input => {
    const key = input.dataset.key;
    if (key === 'id') return;
    let val = (input.value || '').trim();
    if (input.dataset.type === 'json-array') {
      try { val = JSON.parse(val); } catch { toast('Invalid JSON for ' + key, 'error'); return; }
    } else if (input.dataset.type === 'array') {
      val = val.split(',').map(s => s.trim()).filter(Boolean);
    } else if (input.dataset.type === 'boolean') {
      val = val === 'true';
    }
    updated[key] = val;
  });

  file.data.entries[index] = updated;
  await commitFile(filename, `Update ${updated.id} in ${file.data.source}`);
}

async function addEntry(filename) {
  const file = filesCache[filename];
  const inputs = document.querySelectorAll('#modal-body [data-key]');
  const newEntry = {};

  inputs.forEach(input => {
    const key = input.dataset.key;
    let val = (input.value || '').trim();
    if (input.dataset.type === 'array') {
      val = val.split(',').map(s => s.trim()).filter(Boolean);
    }
    newEntry[key] = val;
  });

  if (!newEntry.id) {
    toast('Entry ID is required', 'error');
    return;
  }

  file.data.entries.push(newEntry);
  await commitFile(filename, `Add ${newEntry.id} to ${file.data.source}`);
}

async function deleteEntry(filename, index) {
  const file = filesCache[filename];
  const entry = file.data.entries[index];
  file.data.entries.splice(index, 1);
  await commitFile(filename, `Delete ${entry.id} from ${file.data.source}`);
}

async function commitFile(filename, message) {
  const file = filesCache[filename];
  const yamlStr = jsyaml.dump(file.data, {
    lineWidth: -1,
    noRefs: true,
    quotingType: '"',
    forceQuotes: false,
  });

  const encoded = btoa(unescape(encodeURIComponent(yamlStr)));

  try {
    const resp = await ghPut(`/repos/${REPO}/contents/${filename}`, {
      message,
      content: encoded,
      sha: file.sha,
      branch: BRANCH,
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.message || 'Commit failed');
    }

    const result = await resp.json();
    file.sha = result.content.sha;
    file.raw = yamlStr;

    closeModal();
    toast(`Committed: ${message}`, 'success');
    renderDashboard(Object.values(filesCache));
  } catch (e) {
    toast(`Commit failed: ${e.message}`, 'error');
  }
}

// ── Sync / Reindex ──
document.getElementById('btn-sync').addEventListener('click', () => triggerWorkflow(false));
document.getElementById('btn-full-reindex').addEventListener('click', () => triggerWorkflow(true));

function saveActiveRun(runData) {
  localStorage.setItem('tapasdata-active-run', JSON.stringify(runData));
}

function getActiveRun() {
  try { return JSON.parse(localStorage.getItem('tapasdata-active-run')); } catch { return null; }
}

function clearActiveRun() {
  localStorage.removeItem('tapasdata-active-run');
}

async function triggerWorkflow(fullReindex) {
  const label = fullReindex ? 'Full Reindex' : 'Incremental Sync';
  showStatus(`Triggering ${label}...`);

  try {
    // Capture timestamp before triggering so we can find the right run
    const triggeredAt = new Date().toISOString();

    const resp = await ghPost(`/repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`, {
      ref: BRANCH,
      inputs: { full_reindex: String(fullReindex) },
    });

    if (!resp.ok && resp.status !== 204) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${resp.status}`);
    }

    saveActiveRun({ label, triggeredAt, startedAt: Date.now() });
    toast(`${label} triggered`, 'success');
    showStatus(`${label} triggered — waiting for run...`);

    setTimeout(() => pollWorkflowStatus(), 3000);
  } catch (e) {
    toast(`Failed to trigger: ${e.message}`, 'error');
    showStatus(`Failed: ${e.message}`, 'error');
  }
}

let pollTimer = null;

async function pollWorkflowStatus() {
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }

  const activeRun = getActiveRun();
  if (!activeRun) return;

  const elapsed = Date.now() - activeRun.startedAt;
  if (elapsed > 300000) { // 5 min timeout
    showStatus(`${activeRun.label} — timed out`, 'error');
    clearActiveRun();
    return;
  }

  try {
    const resp = await ghFetch(`/repos/${REPO}/actions/runs?per_page=5&branch=${BRANCH}`);
    if (!resp.ok) { pollTimer = setTimeout(pollWorkflowStatus, 5000); return; }
    const data = await resp.json();

    // Find the run that was created after our trigger
    const run = data.workflow_runs?.find(r =>
      new Date(r.created_at) >= new Date(activeRun.triggeredAt)
    ) || data.workflow_runs?.[0];

    if (!run) {
      showStatus(`${activeRun.label} — queued, waiting...`);
      pollTimer = setTimeout(pollWorkflowStatus, 3000);
      return;
    }

    if (run.status === 'completed') {
      clearActiveRun();
      if (run.conclusion === 'success') {
        showStatus(`${activeRun.label} completed successfully`, 'success');
        toast(`${activeRun.label} completed`, 'success');
      } else {
        showStatus(`${activeRun.label} failed: ${run.conclusion}`, 'error');
        toast(`${activeRun.label} ${run.conclusion}`, 'error');
      }
      return;
    }

    // Still running
    const statusLabel = run.status === 'queued' ? 'queued' : run.status === 'in_progress' ? 'running' : run.status;
    const mins = Math.floor(elapsed / 60000);
    const secs = Math.floor((elapsed % 60000) / 1000);
    const timeStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
    showStatus(`${activeRun.label} — ${statusLabel} (${timeStr})`);
    pollTimer = setTimeout(pollWorkflowStatus, 3000);
  } catch (e) {
    showStatus(`${activeRun.label} — checking...`);
    pollTimer = setTimeout(pollWorkflowStatus, 5000);
  }
}

function resumeActiveRunOnLoad() {
  const activeRun = getActiveRun();
  if (!activeRun) return;

  const elapsed = Date.now() - activeRun.startedAt;
  if (elapsed > 300000) {
    clearActiveRun();
    return;
  }

  showStatus(`${activeRun.label} — resuming status check...`);
  pollWorkflowStatus();
}

// ── Status Bar ──
function showStatus(text, state) {
  const bar = document.getElementById('status-bar');
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  bar.classList.add('active');
  txt.textContent = text;
  dot.className = 'status-dot' + (state === 'success' ? ' success' : state === 'error' ? ' error' : '');
}

document.getElementById('status-close').addEventListener('click', () => {
  document.getElementById('status-bar').classList.remove('active');
  // Only clear the active run if it's completed (success/error)
  const dot = document.getElementById('status-dot');
  if (dot.classList.contains('success') || dot.classList.contains('error')) {
    clearActiveRun();
  }
});

// ── Toast ──
function toast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  el.innerHTML = `<span>${icons[type] || 'ℹ'}</span> ${esc(msg)}`;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 4000);
}

// ── Utils ──
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Init ──
initAuth();
</script>
