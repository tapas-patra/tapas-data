name: Sync Data to RAG

on:
  push:
    branches: [main]
    paths:
      - "*.yaml"
  workflow_dispatch:
    inputs:
      full_reindex:
        description: "Wipe all data and re-embed everything"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync to backend
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_REINDEX_TOKEN: ${{ secrets.ADMIN_REINDEX_TOKEN }}
        run: |
          if [ "${{ inputs.full_reindex }}" = "true" ]; then
            python scripts/sync.py --full
          else
            python scripts/sync.py
          fi
